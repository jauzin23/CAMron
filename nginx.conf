server {
    listen 80;
    server_name localhost;

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M; # Needs to be large because of the firmware
    }

    # Proxy video stream requests to backend
    location /stream {
        proxy_pass http://backend:3000/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_buffering off;       # Disable buffering for real-time video streaming
        proxy_cache off;           # Disable cache
        client_max_body_size 0;    # Allow infinite streaming uploads from cameras
    }

    # Proxy the rest of the requests to Next.js
    location / {
        proxy_pass http://frontend:3005/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
