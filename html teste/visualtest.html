<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign in</title>
<style>
  :root {
    --bg: #09090b;
    --panel: #0c0c0f;
    --border: #1f1f23;
    --text: #fafafa;
    --muted: #8a8a93;
    --accent: #3b82f6;
    --tank-glass: #050507;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, "Inter", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
  }

  /* ---------- LEFT: aquarium panel ---------- */

  .tank {
    position: relative;
    flex: 1.1;
    overflow: hidden;
    background: var(--tank-glass);
    border-right: 1px solid var(--border);
  }

  /* subtle vignette so the gif feels embedded in glass, not pasted */
  .tank::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    box-shadow: inset 0 0 120px 40px rgba(0,0,0,0.85);
  }

  .tank-stage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280px;
    height: 280px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    border-radius: 16px;
    overflow: hidden;
    background: #050508;
    border: 1px solid #1f1f23;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .tank-stage img {
    image-rendering: pixelated;
  }

  #shrimp {
    position: relative;
    width: 68%;
    margin-bottom: 6%;
    z-index: 2;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6));
  }

  #water {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.55;
    mix-blend-mode: screen;
    z-index: 3;
    pointer-events: none;
  }

  .tank-label {
    position: absolute;
    top: 28px;
    left: 32px;
    z-index: 6;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tank-label .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .tank-label span {
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .tank-caption {
    position: absolute;
    top: calc(50% + 170px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    width: 300px;
    text-align: center;
  }

  .tank-caption h1 {
    font-size: 22px;
    margin: 0 0 6px;
    font-weight: 600;
  }

  .tank-caption p {
    margin: 0;
    font-size: 13px;
    color: var(--muted);
    max-width: 360px;
    line-height: 1.5;
  }

  /* ---------- RIGHT: shadcn-style form ---------- */

  .form-side {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    min-width: 380px;
  }

  .form-card {
    width: 100%;
    max-width: 360px;
  }

  .form-card h2 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 6px;
  }

  .form-card .sub {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 28px;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    color: var(--text);
  }

  .field input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s ease;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }

  .field input::placeholder {
    color: #52525b;
  }

  .btn-primary {
    width: 100%;
    background: var(--text);
    color: #0a0a0a;
    border: none;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.15s ease;
  }

  .btn-primary:hover { opacity: 0.85; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
    color: var(--muted);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .btn-secondary {
    width: 100%;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .btn-secondary:hover { background: var(--panel); }

  .footnote {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-top: 24px;
  }

  .footnote a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 800px) {
    body { flex-direction: column; }
    .tank { flex: none; height: 38vh; border-right: none; border-bottom: 1px solid var(--border); }
    .form-side { flex: none; min-width: 0; }
  }
</style>
</head>
<body>

  <div class="tank">
    <div class="tank-label">
      <div class="dot"></div>
      <span>Flashing . ESP32-CAM</span>
    </div>

    <div class="tank-stage">
      <img id="shrimp" src="shrimp.gif" alt="Mascot soldering at the bench">
      <img id="water" src="water.gif" alt="">
    </div>

    <div class="tank-caption">
      <h1>Don't unplug it yet.</h1>
      <p>Writing firmware over Web Serial - this usually takes under a minute. Keep the USB connection in place.</p>
    </div>
  </div>

  <div class="form-side">
    <div class="form-card">
      <h2>Flashing device</h2>
      <p class="sub">Step 2 of 2 - installing CAMron firmware.</p>

      <div class="field">
        <label>Port</label>
        <input type="text" value="/dev/tty.usbserial-1420" readonly>
      </div>

      <div class="field">
        <label>Progress</label>
        <input type="text" value="Writing partition table. 64%" readonly>
      </div>

      <button class="btn-primary">Cancel flash</button>

      <div class="divider">DEVICE LOG</div>

      <button class="btn-secondary">View raw output</button>

      <p class="footnote">Trouble connecting? <a href="#">Check Web Serial setup</a></p>
    </div>
  </div>

</body>
</html>
