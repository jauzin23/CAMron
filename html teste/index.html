<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overlay Test</title>
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #2b2b2b;
    font-family: sans-serif;
    color: #eee;
    gap: 16px;
    padding: 20px 0 60px;
  }

  .container {
    position: relative;
    width: 400px;
    height: 400px;
    background: #444; /* visual guide, remove/replace as needed */
    overflow: hidden;
    border: 1px solid #666;
  }

  .container img {
    position: absolute;
    image-rendering: pixelated; /* keeps pixel art crisp */
  }

  #base {
    z-index: 1;
  }

  #overlay {
    z-index: 2;
  }

  .panels {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls {
    background: #1c1c1c;
    padding: 14px 18px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 240px;
  }

  .controls h3 {
    margin: 0 0 4px;
    font-size: 14px;
    border-bottom: 1px solid #444;
    padding-bottom: 6px;
  }

  .controls label {
    font-size: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .controls label span {
    display: flex;
    justify-content: space-between;
  }

  select, input[type="range"], input[type="number"] {
    width: 100%;
  }
</style>
</head>
<body>

  <div class="container">
    <img id="base" src="shrimp.gif" alt="base character">
    <img id="overlay" src="water.gif" alt="water overlay">
  </div>

  <div class="panels">

    <div class="controls">
      <h3>Base (shrimp.gif)</h3>
      <label>X position (px) <span id="baseXVal">0</span>
        <input type="range" id="baseX" min="-200" max="200" step="1" value="0">
      </label>
      <label>Y position (px) <span id="baseYVal">0</span>
        <input type="range" id="baseY" min="-200" max="200" step="1" value="0">
      </label>
      <label>Width (px) <span id="baseWVal">256</span>
        <input type="range" id="baseW" min="50" max="400" step="1" value="256">
      </label>
      <label>Height (px) <span id="baseHVal">256</span>
        <input type="range" id="baseH" min="50" max="400" step="1" value="256">
      </label>
    </div>

    <div class="controls">
      <h3>Overlay (water.gif)</h3>
      <label>X position (px) <span id="overXVal">0</span>
        <input type="range" id="overX" min="-200" max="200" step="1" value="0">
      </label>
      <label>Y position (px) <span id="overYVal">0</span>
        <input type="range" id="overY" min="-200" max="200" step="1" value="0">
      </label>
      <label>Width (px) <span id="overWVal">256</span>
        <input type="range" id="overW" min="50" max="400" step="1" value="256">
      </label>
      <label>Height (px) <span id="overHVal">256</span>
        <input type="range" id="overH" min="50" max="400" step="1" value="256">
      </label>
      <label>Opacity <span id="opacityVal">0.45</span>
        <input type="range" id="opacitySlider" min="0" max="1" step="0.05" value="0.45">
      </label>
      <label>Blend mode
        <select id="blendSelect">
          <option value="normal">normal</option>
          <option value="screen" selected>screen</option>
          <option value="lighten">lighten</option>
          <option value="overlay">overlay</option>
          <option value="soft-light">soft-light</option>
          <option value="multiply">multiply</option>
          <option value="color-dodge">color-dodge</option>
          <option value="hard-light">hard-light</option>
        </select>
      </label>
    </div>

  </div>

<script>
  const base = document.getElementById('base');
  const overlay = document.getElementById('overlay');

  function bindRange(id, valId, applyFn) {
    const el = document.getElementById(id);
    const valEl = document.getElementById(valId);
    el.addEventListener('input', () => {
      valEl.textContent = el.value;
      applyFn(el.value);
    });
    applyFn(el.value);
    valEl.textContent = el.value;
  }

  bindRange('baseX', 'baseXVal', v => base.style.left = v + 'px');
  bindRange('baseY', 'baseYVal', v => base.style.top = v + 'px');
  bindRange('baseW', 'baseWVal', v => base.style.width = v + 'px');
  bindRange('baseH', 'baseHVal', v => base.style.height = v + 'px');

  bindRange('overX', 'overXVal', v => overlay.style.left = v + 'px');
  bindRange('overY', 'overYVal', v => overlay.style.top = v + 'px');
  bindRange('overW', 'overWVal', v => overlay.style.width = v + 'px');
  bindRange('overH', 'overHVal', v => overlay.style.height = v + 'px');

  bindRange('opacitySlider', 'opacityVal', v => overlay.style.opacity = v);

  document.getElementById('blendSelect').addEventListener('change', e => {
    overlay.style.mixBlendMode = e.target.value;
  });
  overlay.style.mixBlendMode = document.getElementById('blendSelect').value;
</script>

</body>
</html>
