services:
  gateway:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-3005}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - CAMERA_BEARER_TOKEN=${CAMERA_BEARER_TOKEN}
      - HOST_IP=${HOST_IP}
      - ARDUINO_CLI_PATH=/usr/local/bin/arduino-cli
      - PUBLIC_PORT=${FRONTEND_PORT:-3005}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
