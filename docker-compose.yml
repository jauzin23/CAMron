services:
  gateway:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - HOST_IP=${HOST_IP}
      - PUBLIC_PORT=${FRONTEND_PORT}
      - APP_PIN=${APP_PIN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
    volumes:
      - backend-data:/app/data
      - arduino-core-data:/home/node/.arduino15
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  arduino-core-data:
